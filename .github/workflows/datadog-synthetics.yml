# This workflow will trigger Datadog Synthetic tests within your Datadog organisation.
# If the Datadog secrets are not configured, the job will skip cleanly instead of failing PR checks.
# For more information, see: https://docs.datadoghq.com/synthetics/cicd_integrations/github_actions/

name: Run Datadog Synthetic tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Datadog secrets
        id: datadog_secrets
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
        run: |
          if [ -z "$DD_API_KEY" ] || [ -z "$DD_APP_KEY" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Datadog secrets are not configured. Skipping synthetic tests."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Datadog Synthetic tests
        if: steps.datadog_secrets.outputs.available == 'true'
        uses: DataDog/synthetics-ci-github-action@87b505388a22005bb8013481e3f73a367b9a53eb # v1.4.0
        with:
          api_key: ${{ secrets.DD_API_KEY }}
          app_key: ${{ secrets.DD_APP_KEY }}
          test_search_query: "tag:e2e-tests"
