services:
  postgres:
    image: postgres:16
    container_name: chufangapp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chufangapp
    ports:
      - "5432:5432"
    volumes:
      - chufangapp_pg_data:/var/lib/postgresql/data
volumes:
  chufangapp_pg_data:
